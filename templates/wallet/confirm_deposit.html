{% extends "base.html" %}
{% block title %}Confirm-Deposit{% endblock %}
{% block web_content %}
    <style>
    body{
        font-family: Arial, Helvetica, sans-serif;
    }
    .formsDiv{
        width: 35%;
        background-color: white;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.49);
        padding: 10px 10px;
        margin: 20px auto 200px;
    }
    .formTitle{
        text-align: center;
        color: purple;
    }
    .formInstructions{
        text-align: center;
        margin-bottom: 10px;
        font-size: 16px;
        font-weight: 600;
        color: black;
    }
    label{
        font-size: 15px;
        margin-left: 5px;
        color: rgb(130, 134, 138);
    }
    .form-control{
        width: 95%;
        padding: 10px 10px;
        border: none;
        border-bottom: 2px solid purple;
        font-size: 16px;
        text-align: center;
        margin-bottom: 5px;
        box-shadow: 0 0 2px black;
    }
    #confirm{
        width: 100%;
        background-color: green;
        color: white;
        padding: 10px 0;
        font-size: 16px;
        border-radius: 4px;
        
    }
</style>
    <div class="formsDiv">
        <h1 class="formTitle">Confirm Deposit</h1>
        <hr>
        <p class="formInstructions">
            To confirm your deposit please enter the receipt number below
        </p>
        <div style="width: 90%;margin: auto;">
            <form action="{% url 'wallet:confirm_deposit' %}" method="POST">
                {% csrf_token %}
                <div>
                    <input class="form-control" id="receiptNo" type="text" placeholder="Enter receipt No." name="receiptNo"/>
                </div>
                <hr class="my-4">
                <a href="{% url 'wallet:confirm_deposit' %}">
                    <button id="confirm" type="submit" class="btn btn-primary w-100 fw-bold" style="background-color: purple;border: none">Confirm</button>
                </a>
            </form>
        </div> 
        <hr>
        <p style="text-align: center;">
            You have not deposited? <a href="{% url 'wallet:deposit' %}">Deposit</a>
        </p> 
    </div>
{% endblock %}
